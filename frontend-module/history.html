<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Blockchain Castanha</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Navegação */
        nav { margin-bottom: 30px; padding: 15px; background: #e8f5e9; border-radius: 8px; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #2c5e3b; font-weight: bold; transition: color 0.3s; padding-bottom: 2px; }
        nav a:hover { color: #1b3d26; }
        .active { border-bottom: 2px solid #2c5e3b; }
        .nav-test { color: #e53e3e; } .nav-test:hover { color: #c53030; }

        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #2c5e3b; padding-bottom: 10px; }
        h1 { color: #2c5e3b; margin: 0; }
        
        .btn-auditoria { background: #e53e3e; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-auditoria:hover { background: #c53030; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card h3 { margin: 0; color: #718096; font-size: 13px; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; color: #2c5e3b; }
        
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #cbd5e0; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #2c5e3b; color: white; text-align: left; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        .hash-text { font-family: monospace; color: #4a5568; font-size: 12px; word-break: break-all; max-width: 180px; display: block; }
        .badge { background: #ebf8ff; color: #2b6cb0; padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <a href="index.html"> Novo Registro de Lote</a>
        <a href="history.html" class="active"> Explorador & Auditoria</a>
        <a href="rastreabilidade.html">Rastreabilidade</a>
        <a href="test.html" class="nav-test"> Simulador de Ataque</a>
    </nav>

    <div class="header-action">
        <h1>Explorador de Blockchain</h1>
        <button class="btn-auditoria" onclick="verificarIntegridade()"> Executar Auditoria da Rede</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Blocos na Rede</h3><p id="count-blocos">0</p></div>
        <div class="stat-card"><h3>Status da Rede</h3><p style="color: #38a169;">Ativo</p></div>
    </div>

    <input type="text" id="filtroInput" placeholder="🔍 Filtrar por Lote, Etapa ou Hash..." onkeyup="filtrarTabela()">

    <table id="tabelaBlockchain">
        <thead>
            <tr><th>Index</th><th>Data/Hora</th><th>Lote (ID)</th><th>Etapa</th><th>Evento</th><th>Hash do Bloco</th></tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000";

    async function carregarDados() {
        try {
            const response = await fetch(`${API_URL}/chain/`);
            const chain = await response.json();
            const corpoTabela = document.getElementById('corpoTabela');
            corpoTabela.innerHTML = "";

            chain.reverse().forEach(bloco => {
                const d = bloco.dados;
                const row = `<tr>
                    <td><strong>#${bloco.index}</strong></td>
                    <td>${new Date(bloco.timestamp * 1000).toLocaleString()}</td>
                    <td><span class="badge">${d.id_produto || 'SISTEMA'}</span></td>
                    <td>${d.id_etapa || 'Gênesis'}</td>
                    <td>${d.evento}</td>
                    <td><span class="hash-text">${bloco.hash_bloco}</span></td>
                </tr>`;
                corpoTabela.innerHTML += row;
            });
            document.getElementById('count-blocos').innerText = chain.length;
        } catch (error) { console.error("Erro ao carregar"); }
    }

    function filtrarTabela() {
        const filter = document.getElementById("filtroInput").value.toUpperCase();
        const tr = document.getElementById("tabelaBlockchain").getElementsByTagName("tr");
        for (let i = 1; i < tr.length; i++) {
            tr[i].style.display = (tr[i].innerText.toUpperCase().indexOf(filter) > -1) ? "" : "none";
        }
    }

    async function verificarIntegridade() {
        Swal.fire({ title: 'A auditar...', didOpen: () => Swal.showLoading() });
        try {
            const response = await fetch(`${API_URL}/validar/`);
            const data = await response.json();
            if (response.ok) {
                Swal.fire({ icon: 'success', title: 'Blockchain Íntegra!', text: data.mensagem });
            } else {
                Swal.fire({ icon: 'error', title: 'FALHA DE SEGURANÇA', text: data.detail });
            }
        } catch (error) { Swal.fire({ icon: 'warning', title: 'Erro de Conexão' }); }
    }

    carregarDados();
</script>
</body>
</html>
